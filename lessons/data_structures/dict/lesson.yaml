slug: dict
title: "Dicts: Hash Tables with O(1) Everything"
topic: data_structures
month: 1
week: 2
difficulty: easy
estimated_minutes: 30
prerequisites:
  - list
next_lesson: set
theory_file: theory.md

exercises:
  - id: q1
    type: multiple_choice
    question: >
      Which of the following can be used as a dictionary key?
    options:
      - "A list [1, 2, 3]"
      - "A set {1, 2, 3}"
      - "A tuple (1, 2, 3)"
      - "A dict {'a': 1}"
    correct: 2
    explanation: >
      Dict keys must be hashable — meaning their hash value never changes during
      their lifetime. Tuples of hashable types are hashable. Lists, sets, and
      dicts are mutable, so their hash would change if their contents changed —
      Python rejects them as keys with a TypeError. In C terms: the key is used
      as input to the hash function; mutable objects can't guarantee a stable hash.

  - id: q2
    type: short_answer
    question: >
      What method on a dict returns a value for a key if it exists, or a
      default value if the key is missing — without raising a KeyError?
    accepted:
      - "get"
      - ".get"
      - "dict.get"
      - "get()"
    explanation: >
      dict.get(key, default=None) is the safe lookup. It never raises KeyError.
      The equivalent C pattern: check if a hash-table slot is occupied before
      reading it. Prefer .get() over try/except KeyError for simple lookups.

  - id: q3
    type: code
    title: "Implement word_count(text)"
    description: |
      Implement `word_count(text)` that returns a `dict[str, int]` mapping
      each word to the number of times it appears in `text`.

      ```python
      word_count("the cat sat on the mat")
      # {"the": 2, "cat": 1, "sat": 1, "on": 1, "mat": 1}

      word_count("")   # {}
      word_count("hello hello hello")  # {"hello": 3}
      ```

      **Requirements**:
      - Split on whitespace only (`str.split()`).
      - Treat words as case-sensitive (`"The" != "the"`).
      - Return an empty dict for empty input.
      - Do **not** import `Counter` — build the dict manually.

      **C mental model**: this is a hash-table accumulator — insert key with
      value 1 if absent, increment if present.
    hint: >
      Use dict.get(word, 0) to retrieve the current count (defaulting to 0),
      then write back count + 1. Or initialise with `counts = {}` and check
      `if word in counts` before incrementing.
    starter_file: exercises/q3_starter.py
    test_file: exercises/q3_tests.py
