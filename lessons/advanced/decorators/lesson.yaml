exercises:
  - id: q1
    type: multiple_choice
    question: >
      What does applying `@my_decorator` above a function definition actually do?
    options:
      - "Modifies the function's bytecode in place at compile time"
      - "Is syntactic sugar for `func = my_decorator(func)` — the decorator is called with the function and its return value replaces the name"
      - "Schedules the decorator to run each time the function is called, after the function body"
      - "Registers the function in a global decorator registry without modifying it"
    correct: 1
    explanation: >
      `@decorator` is pure syntactic sugar. Python rewrites it to
      `func = decorator(func)` immediately at definition time. The decorator
      receives the original function object, does something with it (usually
      wraps it), and returns the replacement callable. From that point on,
      the name `func` refers to whatever the decorator returned.

  - id: q2
    type: short_answer
    question: >
      What function from the `functools` module should you always apply inside
      a decorator to preserve the wrapped function's __name__, __doc__, and
      other attributes?
    accepted:
      - "wraps"
      - "functools.wraps"
      - "@wraps"
      - "functools.wraps()"
    explanation: >
      `functools.wraps(func)` copies __name__, __doc__, __module__,
      __qualname__, __annotations__, and __dict__ from the wrapped function to
      the wrapper. Without it, introspection tools (help(), debuggers,
      logging) see the wrapper's name instead of the original function's name.
      It also sets __wrapped__ so the original function is still accessible.

  - id: q3
    type: code
    title: "Implement memoize(func)"
    description: |
      Implement `memoize`, a decorator that caches the return value of a
      function based on its arguments. Calling the function again with the
      same arguments returns the cached result without re-running the body.

      ```python
      @memoize
      def fib(n):
          if n < 2:
              return n
          return fib(n - 1) + fib(n - 2)

      fib(10)   # computed
      fib(10)   # returned from cache — fib body not called again
      ```

      **Requirements**:
      - Use `functools.wraps` to preserve the original function's metadata.
      - Cache must be per-decorated-function (not a global shared cache).
      - Works for any function with hashable positional arguments.
      - The decorated function must have a `.cache` attribute exposing the
        internal dict so tests can inspect it.

      **C mental model**: a memoization table is a hash map from input tuple
      to output value. Exactly what you'd write in C: look up the key first,
      compute and insert only on a miss.
    hint: >
      Create a `cache = {}` dict inside memoize. In the wrapper, use `args`
      (the tuple of positional arguments) as the dict key. Check if it's in
      cache before calling func(*args). After defining wrapper, set
      `wrapper.cache = cache` before returning wrapper.
    starter_file: exercises/q3_starter.py
    test_file: exercises/q3_tests.py
